[env:waveshare_s3_zero]
platform = espressif32@6.8.1
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304

; point to a REAL file in your project
board_build.partitions = partitions/default_4MB.csv

board_build.flash_mode = dio

build_flags =
  -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

lib_deps =
  adafruit/Adafruit BusIO
  adafruit/Adafruit MLX90393@^2.0.5
  bblanchon/ArduinoJson
  adafruit/Adafruit NeoPixel

[env:heltec_wifi_lora_32_V3]
platform = espressif32@6.8.1
board = heltec_wifi_lora_32_V3
framework = arduino

monitor_speed = 115200

# Heltec V3 usually has 8MB Flash
board_build.partitions = default_8MB.csv

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    # Define this so our code knows we are on the Heltec
    -DHELTEC_V3 

lib_deps =
    adafruit/Adafruit BusIO
    adafruit/Adafruit MLX90393@^2.0.5
    bblanchon/ArduinoJson
    adafruit/Adafruit NeoPixel